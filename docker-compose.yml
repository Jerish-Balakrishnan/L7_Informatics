version: "3.9"

services:
  backend:
    build:
      context: ./backend
    container_name: movie-explorer-backend
    command: sh -c "python seed.py && python run.py"
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    container_name: movie-explorer-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    depends_on:
      - backend
